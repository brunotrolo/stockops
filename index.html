<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>OPTN CTRL</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OPTN CTRL">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Splash enquanto redireciona */
    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(99,102,241,0.5);
    }

    .icon span {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }

    .app-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f1f5f9;
    }

    .app-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #64748b;
      margin-top: -16px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-top: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Botao instalar -- aparece via JS */
    #btn-instalar {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,102,241,0.5);
      white-space: nowrap;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="splash">
    <img src="icon-192.png" alt="OPTN CTRL" style="width:96px;height:96px;border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div>
      <p class="app-name">OPTN CTRL</p>
      <p class="app-sub">Portfolio de Opcoes B3</p>
    </div>
    <div class="spinner"></div>
  </div>

  <button id="btn-instalar">Instalar App</button>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzFYVHCWG9D6lfkPuylb5_-uMY5_S0H8rcwDu9pAcXi/dev';

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/stockops/sw.js', { scope: '/stockops/' })
        .then(function(reg) {
          console.log('[SW] Registrado. Scope:', reg.scope);
        })
        .catch(function(err) {
          console.warn('[SW] Erro:', err);
        });
    }

    // Botao de instalacao
    var deferredPrompt = null;
    var btnInstalar    = document.getElementById('btn-instalar');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btnInstalar.style.display = 'block';
      console.log('[PWA] App instalavel.');
    });

    btnInstalar.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        console.log('[PWA] Resultado:', result.outcome);
        deferredPrompt = null;
        btnInstalar.style.display = 'none';
      });
    });

    window.addEventListener('appinstalled', function() {
      console.log('[PWA] Instalado com sucesso!');
      btnInstalar.style.display = 'none';
    });

    // Redirecionar para o GAS
    // Se ja esta instalado como PWA (standalone), vai direto.
    // Se nao, aguarda 1.2s para o SW registrar antes de redirecionar.
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;

    if (isStandalone) {
      // Abrindo como app instalado -- vai imediatamente
      window.location.replace(GAS_URL);
    } else {
      // Abrindo no browser -- aguarda SW registrar, depois redireciona
      setTimeout(function() {
        window.location.replace(GAS_URL);
      }, 1500);
    }
  </script>

</body>
</html>
