<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>StockOps</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StockOps">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f1f5f9;
      text-align: center;
    }

    .app-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #64748b;
      margin-top: 6px;
      text-align: center;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #1e293b;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-top: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Botao instalar -- aparece via JS */
    #btn-instalar {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(99,102,241,0.5);
      white-space: nowrap;
      animation: fadeIn 0.3s ease;
    }

    /* Mensagem de erro offline */
    #msg-offline {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      background: #dc2626;
      color: #fff;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      white-space: nowrap;
      animation: fadeIn 0.3s ease;
    }
  </style>
</head>
<body>

  <div class="splash">
    <img src="icon-192.png" alt="StockOps" style="width:96px;height:96px;border-radius:22px;box-shadow:0 8px 32px rgba(0,0,0,0.4);">
    <div>
      <p class="app-name">StockOps</p>
      <p class="app-sub">Portfolio de Opcoes</p>
    </div>
    <div class="spinner"></div>
  </div>

  <button id="btn-instalar">Instalar App</button>
  <div id="msg-offline">Sem conexao. Reconectando...</div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbzFYVHCWG9D6lfkPuylb5_-uMY5_S0H8rcwDu9pAcXi/dev';

    // -------------------------------------------------------
    // Botao de instalacao
    // -------------------------------------------------------
    var deferredPrompt = null;
    var btnInstalar    = document.getElementById('btn-instalar');

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      btnInstalar.style.display = 'block';
      console.log('[PWA] App instalavel.');
    });

    btnInstalar.addEventListener('click', function() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        console.log('[PWA] Resultado:', result.outcome);
        deferredPrompt = null;
        btnInstalar.style.display = 'none';
      });
    });

    window.addEventListener('appinstalled', function() {
      console.log('[PWA] Instalado com sucesso!');
      btnInstalar.style.display = 'none';
    });

    // -------------------------------------------------------
    // Funcao que efetua o redirect para o GAS
    // -------------------------------------------------------
    function redirecionar() {
      if (!navigator.onLine) {
        // Sem rede: mostra aviso e tenta novamente em 3s
        document.getElementById('msg-offline').style.display = 'block';
        setTimeout(redirecionar, 3000);
        return;
      }
      window.location.replace(GAS_URL);
    }

    // -------------------------------------------------------
    // Service Worker + logica de redirect
    // -------------------------------------------------------
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone === true;

    if ('serviceWorker' in navigator) {
      // Registra o SW
      navigator.serviceWorker
        .register('/stockops/sw.js', { scope: '/stockops/' })
        .then(function(reg) {
          console.log('[SW] Registrado. Scope:', reg.scope);
        })
        .catch(function(err) {
          console.warn('[SW] Erro no registro:', err);
        });

      if (isStandalone) {
        // App instalado: redireciona imediatamente (SW ja esta ativo)
        redirecionar();
      } else {
        // Browser: aguarda o SW estar pronto antes de redirecionar
        // Garante que o cache do shell esteja populado
        navigator.serviceWorker.ready.then(function() {
          console.log('[SW] Pronto. Redirecionando...');
          redirecionar();
        });

        // Fallback: se o SW demorar mais de 4s, redireciona mesmo assim
        setTimeout(function() {
          if (window.location.href.indexOf('script.google.com') < 0) {
            console.warn('[SW] Timeout de espera. Redirecionando sem SW.');
            redirecionar();
          }
        }, 4000);
      }
    } else {
      // Browser sem suporte a SW: redireciona direto
      console.warn('[SW] Nao suportado neste browser.');
      redirecionar();
    }
  </script>

</body>
</html>
